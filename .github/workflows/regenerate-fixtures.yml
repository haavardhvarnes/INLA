name: Regenerate oracle fixtures

# Regenerates every R-INLA oracle fixture under
# `scripts/generate-fixtures/` on a pinned R + R-INLA stack and fails if
# the regenerated `.jld2` files drift past rtol=1e-4 / atol=1e-8 from
# the committed copies (see `scripts/generate-fixtures/compare.jl`).
#
# This workflow is a tamper check: it never commits. Deliberate fixture
# updates go through a separate PR that regenerates locally and commits
# the new `.jld2` files alongside a bumped pinned version.
#
# Trigger scope is deliberately narrow — the R-INLA install is heavy
# (~15 min on a clean runner) so we gate on paths that can actually
# change fixture bytes, plus manual dispatch for ad-hoc runs.
#
# Known gaps (see plans/replan-2026-04.md B0-2 follow-ups):
#  1. scripts/generate-fixtures/renv.lock is still a stub — R-INLA
#     package versions are not yet pinned. First successful run should
#     upload the `renv::snapshot()` output as an artifact so we can
#     commit a real lockfile in a follow-up PR.
#  2. BLAS / libm differences across runners cause sub-ULP numeric
#     drift, so the tamper check uses `scripts/generate-fixtures/compare.jl`
#     — a Julia-side tolerance comparator (rtol=1e-4, atol=1e-8) that
#     walks the JLD2 structure rather than comparing raw bytes. Semantic
#     drift (algorithm or input change) still blows past 1e-4 and fails.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/generate-fixtures/**'
      - 'packages/*/test/oracle/fixtures/*.jld2'
      - '.github/workflows/regenerate-fixtures.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  regenerate:
    name: Pinned R-INLA regeneration and tamper check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Posit Public Package Manager — floating "latest" snapshot on
      # the Ubuntu codename matching `runs-on: ubuntu-latest` (currently
      # noble, 24.04). renv.lock is still a stub (see comment block
      # above), so strict pinning isn't yet wired; until it is, drift
      # from CRAN is the same risk as in any other unpinned step.
      R_REPOS_CRAN: "https://packagemanager.posit.co/cran/__linux__/noble/latest"
      # R-INLA stable channel. Version pin is in renv.lock once the
      # follow-up lands; until then we accept whatever "stable" resolves to
      # and capture it in the artifact step below.
      R_REPOS_INLA: "https://inla.r-inla-download.org/R/stable"
      # Force UTF-8 locale so non-ASCII strings in fixture metadata
      # (e.g. "λ_max" in synthetic_generic1) round-trip identically
      # between the developer machine (macOS) and the CI runner. Without
      # this, R writes the string as raw bytes and the regenerated JSON
      # carries `<ce><bb>_max` instead of `λ_max`.
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries for spdep / SpatialEpi / R-INLA
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudunits2-dev libgdal-dev libgeos-dev libproj-dev libsqlite3-dev \
            libgsl-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: false

      - name: Cache R library
        id: r-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-release-ubuntu-${{ hashFiles('scripts/generate-fixtures/renv.lock') }}
          restore-keys: |
            r-release-ubuntu-

      - name: Install R packages (CRAN from PPM + INLA from stable)
        shell: Rscript {0}
        run: |
          # `repos` is set on every install call rather than once at the
          # top: BiocManager::install() temporarily replaces `options(repos)`
          # with the Bioconductor mirror, and on some R versions the
          # original is not restored, so a follow-up install.packages() can
          # silently miss CRAN packages and produce "package not available"
          # warnings instead of hard failures.
          cran_repos <- c(CRAN = Sys.getenv("R_REPOS_CRAN"),
                          INLA = Sys.getenv("R_REPOS_INLA"))
          options(repos = cran_repos)

          # R-INLA imports `gsl` (CRAN) and the Bioconductor packages
          # `Rgraphviz` and `graph`. Without them, `library(INLA)` fails
          # with `dyn.load(...)` / `package or namespace load failed`.
          if (!requireNamespace("BiocManager", quietly = TRUE)) {
              install.packages("BiocManager", repos = cran_repos)
          }
          BiocManager::install(c("Rgraphviz", "graph"),
                               update = FALSE, ask = FALSE)
          options(repos = cran_repos)  # restore after BiocManager

          # Hard-install gsl (system libgsl-dev is on the runner above).
          # Without `repos = cran_repos` we have hit "package 'gsl' is not
          # available" on a stale repo state — keep this explicit.
          install.packages("gsl", repos = cran_repos)
          stopifnot(requireNamespace("gsl", quietly = TRUE))

          # Pin fmesher to match the developer-machine version that
          # generated the committed fixtures. fmesher is a separate
          # CRAN package (used by `scripts/generate-fixtures/spde/*.R`
          # via `library(fmesher)`); PPM's "latest" snapshot can resolve
          # to a newer version whose triangulator produces meshes with
          # different vertex / triangle counts, breaking the tamper
          # check despite no semantic change. 0.7.0 matches the version
          # used to generate the committed `fmesher_meuse_hull.jld2` and
          # `meuse_spde.jld2` fixtures.
          if (!requireNamespace("remotes", quietly = TRUE)) {
              install.packages("remotes", repos = cran_repos)
          }
          remotes::install_version("fmesher", version = "0.7.0",
                                   repos = cran_repos, upgrade = "never")
          fmesher_version <- as.character(packageVersion("fmesher"))
          cat(sprintf("fmesher version pinned to: %s\n", fmesher_version))

          needed <- c("jsonlite", "Matrix", "SpatialEpi", "spdep", "INLA")
          missing <- needed[!sapply(needed, requireNamespace, quietly = TRUE)]
          if (length(missing) > 0) {
              install.packages(missing, dependencies = TRUE,
                               repos = cran_repos)
          }
          # Force-load INLA to surface dyn.load failures here, not during
          # the regenerate step where the error message is harder to spot.
          library(INLA)
          inla_version <- as.character(packageVersion("INLA"))
          cat(sprintf("INLA version resolved to: %s\n", inla_version))
          writeLines(inla_version, "scripts/generate-fixtures/INLA_VERSION.txt")

      - uses: julia-actions/setup-julia@v2
        with:
          # ADR-020: Julia 1.12+ is the supported floor across the
          # monorepo. `'1'` resolves to the latest stable release.
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Instantiate Julia conversion project
        run: make -C scripts/generate-fixtures setup

      - name: Stage committed fixtures (snapshot before regeneration)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p committed-fixtures
          find packages -name "*.jld2" -path "*/test/oracle/fixtures/*" | while read -r f; do
            dest="committed-fixtures/${f#packages/}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          echo "Staged $(find committed-fixtures -name '*.jld2' | wc -l) committed fixtures."

      - name: Regenerate every fixture via make all
        run: make -C scripts/generate-fixtures all

      - name: Stage regenerated fixtures (snapshot after regeneration)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p regenerated-fixtures
          # Preserve per-package directory structure so the artifact
          # can be dropped in place with `cp -r regenerated-fixtures/. packages/`.
          find packages -name "*.jld2" -path "*/test/oracle/fixtures/*" | while read -r f; do
            dest="regenerated-fixtures/${f#packages/}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

      - name: Tamper check — tolerance compare committed vs regenerated
        shell: bash
        run: |
          set -uo pipefail
          # `set -e` deliberately not enabled — we capture the compare.jl
          # exit code via the `if` form so the diff report still gets
          # emitted to the step summary on failure (visible without auth
          # on public-repo run pages).

          # Tolerance comparator (rtol=1e-4, atol=1e-8). BLAS/libm sub-ULP
          # differences between developer machine and CI runner can cause
          # byte diff to fail spuriously; compare.jl walks the JLD2
          # structure numerically. Real semantic drift (algorithm or
          # input change) still blows past 1e-4 and fails loudly.
          if julia --project=scripts/generate-fixtures \
              scripts/generate-fixtures/compare.jl \
              committed-fixtures regenerated-fixtures \
              2>&1 | tee fixture-compare.log; then
            cmp_passed=1
          else
            cmp_passed=0
          fi

          # Always render the diff report into the run-page step summary
          # so it's visible without log-read auth.
          {
            if [ "$cmp_passed" -eq 1 ]; then
              echo "## ✅ Fixture tolerance compare passed"
            else
              echo "## ❌ Fixture tolerance compare failed"
            fi
            echo
            echo '```'
            cat fixture-compare.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$cmp_passed" -eq 0 ]; then
            echo "::error title=Fixture drift::Regeneration produced numerically different fixtures."
            echo "Possible causes:"
            echo "  (a) A fixture-generation script changed deliberately"
            echo "      — commit the regenerated .jld2 files alongside the change."
            echo "  (b) R-INLA stack drift past tolerance"
            echo "      — check the INLA version line emitted earlier."
            echo "Full diff is in the run-page step summary and in the"
            echo "uploaded fixture-regen-bundle artifact (fixture-compare.log)."
            exit 1
          fi

          # Detect new, untracked fixtures (orthogonal to drift)
          untracked=$(git ls-files --others --exclude-standard 'packages/*/test/oracle/fixtures/*.jld2' || true)
          if [ -n "${untracked}" ]; then
            echo "::error title=Uncommitted fixtures::Regeneration produced fixtures that are not committed:"
            printf '  %s\n' ${untracked}
            echo "Commit them in the same PR that adds/modifies the generator script."
            exit 1
          fi

          echo "All committed fixtures match regenerated fixtures within rtol=1e-4."

      - name: Upload R package manifest (renv.lock bootstrap aid)
        if: always()
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = Sys.getenv("R_REPOS_CRAN"),
                            INLA = Sys.getenv("R_REPOS_INLA")))
          pkgs <- installed.packages()[, c("Package", "Version", "Built")]
          write.csv(pkgs, "r-package-manifest.csv", row.names = FALSE)

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-regen-bundle
          path: |
            r-package-manifest.csv
            scripts/generate-fixtures/INLA_VERSION.txt
            regenerated-fixtures/
            fixture-compare.log
          retention-days: 30
