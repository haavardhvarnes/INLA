name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: ${{ matrix.package }} / Julia ${{ matrix.julia-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Only packages with a populated `src/`. `LGMFormula.jl` and
        # `GMRFsPardiso.jl` are 0.1.0-DEV scaffolding without sources;
        # add them back when they ship.
        package:
          - GMRFs.jl
          - LatentGaussianModels.jl
          - INLASPDE.jl
          - LGMTuring.jl
          - INLASPDERasters.jl
        julia-version:
          - '1.10'   # LTS
          - '1'      # current stable
        os:
          - ubuntu-latest
        include:
          # Mac and Windows only on LTS, only for core three
          - package: GMRFs.jl
            julia-version: '1.10'
            os: macos-latest
          - package: GMRFs.jl
            julia-version: '1.10'
            os: windows-latest
          - package: LatentGaussianModels.jl
            julia-version: '1.10'
            os: macos-latest
          - package: LatentGaussianModels.jl
            julia-version: '1.10'
            os: windows-latest
          - package: INLASPDE.jl
            julia-version: '1.10'
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Dev-link intra-ecosystem deps
        # `matrix` is not a valid context inside `shell:`; pass the project
        # via `JULIA_PROJECT` instead so the matrix interpolation lives in
        # `env:` (where it's allowed). Same payload as before.
        shell: julia --color=yes {0}
        env:
          JULIA_PROJECT: packages/${{ matrix.package }}
        run: |
          using Pkg, TOML
          # Dev-link the transitive closure of intra-ecosystem [deps]
          # rooted at the active project. Direct-only doesn't suffice
          # (e.g. LGMTuring depends on LatentGaussianModels which depends
          # on GMRFs; GMRFs isn't on General yet). Restricting to deps
          # that ARE in the chain keeps Aqua happy — no spurious
          # `[deps]` entries get added.
          active = abspath(ENV["JULIA_PROJECT"])
          local_by_name = Dict{String,String}()
          for p in readdir("packages", join=true)
              (isdir(p) && isdir(joinpath(p, "src")) && abspath(p) != active) || continue
              name = TOML.parsefile(joinpath(p, "Project.toml"))["name"]
              local_by_name[name] = p
          end
          to_dev_paths = String[]
          to_dev_names = Set{String}()
          queue = collect(keys(get(TOML.parsefile(joinpath(active, "Project.toml")), "deps", Dict{String,Any}())))
          while !isempty(queue)
              name = popfirst!(queue)
              (name in to_dev_names || !haskey(local_by_name, name)) && continue
              push!(to_dev_names, name)
              p = local_by_name[name]
              push!(to_dev_paths, p)
              sub_deps = get(TOML.parsefile(joinpath(p, "Project.toml")), "deps", Dict{String,Any}())
              append!(queue, keys(sub_deps))
          end
          isempty(to_dev_paths) || Pkg.develop([Pkg.PackageSpec(path=p) for p in to_dev_paths])
          Pkg.instantiate()
      - uses: julia-actions/julia-runtest@v1
        with:
          project: packages/${{ matrix.package }}
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: packages/${{ matrix.package }}/src
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: ${{ matrix.package }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  nightly:
    name: ${{ matrix.package }} / Julia nightly (allowed-to-fail)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package: [GMRFs.jl, LatentGaussianModels.jl, INLASPDE.jl]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: 'nightly'
      - uses: julia-actions/cache@v2
      - name: Dev-link intra-ecosystem deps
        shell: julia --color=yes {0}
        env:
          JULIA_PROJECT: packages/${{ matrix.package }}
        run: |
          using Pkg, TOML
          # Transitive closure of intra-ecosystem deps; mirrors the
          # main `test` job above. See the comment there for why.
          active = abspath(ENV["JULIA_PROJECT"])
          local_by_name = Dict{String,String}()
          for p in readdir("packages", join=true)
              (isdir(p) && isdir(joinpath(p, "src")) && abspath(p) != active) || continue
              name = TOML.parsefile(joinpath(p, "Project.toml"))["name"]
              local_by_name[name] = p
          end
          to_dev_paths = String[]
          to_dev_names = Set{String}()
          queue = collect(keys(get(TOML.parsefile(joinpath(active, "Project.toml")), "deps", Dict{String,Any}())))
          while !isempty(queue)
              name = popfirst!(queue)
              (name in to_dev_names || !haskey(local_by_name, name)) && continue
              push!(to_dev_names, name)
              p = local_by_name[name]
              push!(to_dev_paths, p)
              sub_deps = get(TOML.parsefile(joinpath(p, "Project.toml")), "deps", Dict{String,Any}())
              append!(queue, keys(sub_deps))
          end
          isempty(to_dev_paths) || Pkg.develop([Pkg.PackageSpec(path=p) for p in to_dev_paths])
          Pkg.instantiate()
      - uses: julia-actions/julia-runtest@v1
        with:
          project: packages/${{ matrix.package }}

  format-check:
    name: Formatting (SciML style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install JuliaFormatter
        shell: julia --color=yes {0}
        run: |
          using Pkg
          Pkg.add(Pkg.PackageSpec(name="JuliaFormatter", version="1"))
      - name: Check formatting
        shell: julia --color=yes {0}
        run: |
          using JuliaFormatter
          ok = format(".", verbose=true, overwrite=false)
          if !ok
              @error "Formatter would change files. Run `julia -e 'using JuliaFormatter; format(\".\")'` locally."
              exit(1)
          end
