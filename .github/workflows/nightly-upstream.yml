name: Nightly upstream refresh

# Re-run R-INLA oracle fixtures against the latest R-INLA to detect upstream
# drift. Failures here open a tracking issue, not a release-blocker on main.
on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday 04:00 UTC
  workflow_dispatch:

jobs:
  refresh-oracle:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'havardh'  # adjust once org/owner is finalised
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install R-INLA (testing build)
        run: |
          Rscript -e 'install.packages("INLA", repos = c(getOption("repos"), INLA = "https://inla.r-inla-download.org/R/testing"), dep = TRUE)'
          Rscript -e 'cat("R-INLA version:", as.character(packageVersion("INLA")), "\n")'
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Regenerate oracle fixtures
        run: |
          if [ -d scripts/generate-fixtures ]; then
            for f in scripts/generate-fixtures/*.R; do
              echo "Running $f"
              Rscript "$f"
            done
          fi
      - name: Run oracle tests against fresh fixtures
        shell: julia --color=yes --project=packages/LatentGaussianModels.jl {0}
        run: |
          using Pkg
          local_pkgs = filter(isdir, readdir("packages", join=true))
          Pkg.develop([Pkg.PackageSpec(path=p) for p in local_pkgs])
          Pkg.instantiate()
          Pkg.test("LatentGaussianModels"; test_args=["--oracle"])
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly upstream refresh failed (${new Date().toISOString().slice(0,10)})`,
              body: `See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['upstream-drift', 'oracle']
            });
