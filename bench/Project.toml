# Reproducible-environment manifest for `bench/oracle_compare.jl`.
#
# `bench/Manifest.toml` is gitignored (top-level `.gitignore`). To
# reproduce the env from a fresh clone, run from the repo root:
#
#   julia --project=bench -e '
#       using Pkg
#       Pkg.develop([
#           Pkg.PackageSpec(path = "packages/GMRFs.jl"),
#           Pkg.PackageSpec(path = "packages/LatentGaussianModels.jl"),
#           Pkg.PackageSpec(path = "packages/INLASPDE.jl"),
#       ])
#       Pkg.instantiate()'

